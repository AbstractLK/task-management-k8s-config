nameOverride: auth-service
replicaCount: 2

image:
  repository: abstraxlk/task-management-auth-service
  tag: 3
  pullPolicy: IfNotPresent

env:
  port: "4001"
  corsOrigin: ""
  secretName: task-management-secrets
  mongodbUriKey: auth-mongodb-uri
  jwtSecretKey: jwt-secret

ingress:
  enabled: true
  className: nginx
  host: ""
  path: /api/auth(/|$)(.*)

resources:
  requests:
    cpu: 250m
    memory: 256Mi
  limits:
    cpu: 750m
    memory: 512Mi
